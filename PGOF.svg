<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">PGOF Parking Garage Scene</title>
  <desc id="desc">An illustration of the Parking Garage of the Future with a queue of waiting cars, parking lots, and cars leaving in three car sizes.</desc>

  <rect width="1200" height="700" fill="#e9f3ff"/>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#1b3f7a">PGOF</text>
  <text x="600" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#29528f">Parking Garage of the Future</text>

  <rect x="360" y="160" width="480" height="330" rx="14" fill="#f7f9fc" stroke="#6f7e91" stroke-width="4"/>
  <rect x="395" y="205" width="410" height="70" fill="#d9e0ea" stroke="#7a8594" stroke-width="2"/>
  <rect x="395" y="300" width="410" height="70" fill="#d9e0ea" stroke="#7a8594" stroke-width="2"/>
  <rect x="395" y="395" width="410" height="70" fill="#d9e0ea" stroke="#7a8594" stroke-width="2"/>
  <line x1="530" y1="205" x2="530" y2="465" stroke="#ffffff" stroke-width="4" stroke-dasharray="14 12"/>
  <line x1="670" y1="205" x2="670" y2="465" stroke="#ffffff" stroke-width="4" stroke-dasharray="14 12"/>
  <text x="600" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#40546f">Automated Lots</text>

  <path d="M60 560 H1140" stroke="#2f3f56" stroke-width="44" stroke-linecap="round"/>
  <line x1="80" y1="560" x2="1120" y2="560" stroke="#ffffff" stroke-width="5" stroke-dasharray="20 16"/>

  <defs>
    <g id="car-small">
      <rect x="0" y="-14" width="60" height="28" rx="8" fill="currentColor"/>
      <rect x="15" y="-22" width="30" height="12" rx="4" fill="#d9f0ff"/>
      <circle cx="14" cy="15" r="6" fill="#1a1f2b"/>
      <circle cx="46" cy="15" r="6" fill="#1a1f2b"/>
    </g>
    <g id="car-medium">
      <rect x="0" y="-18" width="86" height="36" rx="9" fill="currentColor"/>
      <rect x="20" y="-30" width="44" height="14" rx="4" fill="#d9f0ff"/>
      <circle cx="18" cy="18" r="7" fill="#1a1f2b"/>
      <circle cx="68" cy="18" r="7" fill="#1a1f2b"/>
    </g>
    <g id="car-large">
      <rect x="0" y="-22" width="120" height="44" rx="10" fill="currentColor"/>
      <rect x="26" y="-36" width="64" height="16" rx="4" fill="#d9f0ff"/>
      <circle cx="22" cy="22" r="9" fill="#1a1f2b"/>
      <circle cx="96" cy="22" r="9" fill="#1a1f2b"/>
    </g>
  </defs>

  <text x="120" y="520" font-family="Arial, sans-serif" font-size="20" fill="#223c67">Queue</text>
  <use href="#car-small" x="80" y="560" style="color:#e85d75"/>
  <use href="#car-medium" x="170" y="560" style="color:#43b581"/>
  <use href="#car-large" x="290" y="560" style="color:#f4a340"/>

  <line x1="455" y1="520" x2="455" y2="480" stroke="#1e3a65" stroke-width="4"/>
  <polygon points="455,470 445,486 465,486" fill="#1e3a65"/>
  <line x1="600" y1="520" x2="600" y2="480" stroke="#1e3a65" stroke-width="4"/>
  <polygon points="600,470 590,486 610,486" fill="#1e3a65"/>
  <line x1="745" y1="520" x2="745" y2="480" stroke="#1e3a65" stroke-width="4"/>
  <polygon points="745,470 735,486 755,486" fill="#1e3a65"/>

  <use href="#car-small" x="430" y="245" style="color:#4d8df5"/>
  <use href="#car-medium" x="555" y="340" style="color:#7a59d1"/>
  <use href="#car-large" x="660" y="438" style="color:#e07a2f"/>

  <text x="920" y="520" font-family="Arial, sans-serif" font-size="20" fill="#223c67">Leaving</text>
  <polygon points="845,535 875,560 845,585" fill="#1e3a65"/>
  <use href="#car-small" x="900" y="560" style="color:#59a3ff"/>
  <use href="#car-medium" x="980" y="560" style="color:#64c98b"/>
  <use href="#car-large" x="1060" y="560" style="color:#ff7f66"/>
</svg>
